name: build-and-test

# All `run:` steps below use hardcoded commands only — no user-controlled
# inputs (issue titles, PR bodies, branch refs, etc.) are interpolated.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  neoforge:
    name: NeoForge (Java 21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: pip install Pillow

      - name: Decompile vanilla MC sources
        working-directory: neoforge
        run: ./gradlew --no-daemon :neoFormDecompile

      - name: Build + verify (validateResources, test, build)
        working-directory: neoforge
        run: ./gradlew --no-daemon check build

      - name: Upload JAR artefact
        uses: actions/upload-artifact@v4
        with:
          name: buckets_update-neoforge
          path: neoforge/build/libs/*.jar
          if-no-files-found: error

  fabric:
    name: Fabric (Java 25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: pip install Pillow

      - name: Build + verify (validateResources, test, build)
        working-directory: fabric
        run: ./gradlew --no-daemon check build

      - name: Upload JAR artefact
        uses: actions/upload-artifact@v4
        with:
          name: buckets_update-fabric
          path: fabric/build/libs/*.jar
          if-no-files-found: error
